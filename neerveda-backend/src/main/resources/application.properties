# ==========================================
#   NeerVeda Backend - Application Config
# ==========================================

# Server Port
server.port=8080

# Application Name
spring.application.name=neerveda-backend

# ==========================================
#   Firebase Configuration
#   (Add your Firebase project details here)
# ==========================================
firebase.project-id=YOUR_FIREBASE_PROJECT_ID
firebase.credentials-file=firebase-service-account.json

# ==========================================
#   Water Quality Thresholds
#   (Based on WHO & Jal Jeevan Mission standards)
# ==========================================
neerveda.threshold.ph.min=6.5
neerveda.threshold.ph.max=8.5
neerveda.threshold.tds.max=500
neerveda.threshold.turbidity.max=5
neerveda.threshold.temperature.max=35

# ==========================================
#   Alert Configuration
# ==========================================
neerveda.alert.enabled=true

# ==========================================
#   Logging
# ==========================================
logging.level.com.neerveda=DEBUG
logging.level.root=INFO
