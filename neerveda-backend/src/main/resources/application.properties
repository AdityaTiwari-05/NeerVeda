# ============================================================
#   NeerVeda Backend — Application Configuration
#   Smart Water Safety & Disease Prevention System
#   Team CORE_401 | Problem ID: SIH25001
# ============================================================

# ----- Server -----------------------------------------------
server.port=8080
spring.application.name=neerveda-backend

# ----- Firebase ---------------------------------------------
firebase.project-id=${FIREBASE_PROJECT_ID:neerveda-dev}
firebase.credentials-file=firebase-service-account.json

# ----- JWT --------------------------------------------------
neerveda.jwt.secret=${JWT_SECRET:NeerVedaSuperSecretKeyForJWTTokenGenerationMin256Bits2024SIH}
neerveda.jwt.access-token-expiry=900000
# 15 minutes in ms
neerveda.jwt.refresh-token-expiry=604800000
# 7 days in ms

# ----- Water Quality Thresholds (WHO + Jal Jeevan Mission) --
neerveda.threshold.ph.min=6.5
neerveda.threshold.ph.max=8.5
neerveda.threshold.tds.max=500
neerveda.threshold.turbidity.max=5
neerveda.threshold.temperature.max=35

# ----- Alerts -----------------------------------------------
neerveda.alert.enabled=true
neerveda.alert.outbreak.threshold=3

# ----- Twilio SMS -------------------------------------------
twilio.account-sid=${TWILIO_ACCOUNT_SID:PLACEHOLDER_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN:PLACEHOLDER_TOKEN}
twilio.from-number=${TWILIO_FROM:+15005550006}
twilio.enabled=${TWILIO_ENABLED:false}

# ----- CORS -------------------------------------------------
neerveda.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

# ----- Rate Limiting ----------------------------------------
neerveda.rate-limit.capacity=20
neerveda.rate-limit.refill-tokens=20
neerveda.rate-limit.refill-period-seconds=60

# ----- Actuator ---------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=NeerVeda
info.app.version=1.0.0
info.app.team=CORE_401
info.app.problem-id=SIH25001

# ----- Logging ----------------------------------------------
logging.level.com.neerveda=DEBUG
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ----- SpringDoc / Swagger UI -------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=true
springdoc.info.title=NeerVeda API
springdoc.info.description=Smart Water Safety and Disease Prevention System
springdoc.info.version=1.0.0
